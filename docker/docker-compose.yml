services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: ppt-ai-server
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ../server/.env
    volumes:
      - ../knowledge:/knowledge
      - ../server/prompts:/app/prompts
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ppt-ai-net

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: ppt-ai-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    networks:
      - ppt-ai-net

networks:
  ppt-ai-net:
    driver: bridge
