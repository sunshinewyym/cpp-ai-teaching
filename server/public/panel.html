<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>C++ AI 教学助手</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwindcss.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['-apple-system','BlinkMacSystemFont','Segoe UI','PingFang SC','Microsoft YaHei','sans-serif']}}}}</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f8fafc;color:#1e293b;height:100vh;display:flex;flex-direction:column}
.header{padding:10px 20px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:12px;flex-shrink:0}
.header h1{font-size:16px;color:#4f46e5}
.header input{padding:5px 10px;background:#fff;border:1px solid #e2e8f0;border-radius:6px;color:#1e293b;font-size:12px;width:200px}
.header input:focus{outline:none;border-color:#4f46e5}
.tabs{display:flex;gap:4px;padding:8px 20px;background:#fff;border-bottom:1px solid #e2e8f0;flex-shrink:0;flex-wrap:wrap}
.tabs button{padding:6px 14px;background:#fff;border:1px solid #e2e8f0;border-radius:6px;color:#64748b;font-size:12px;cursor:pointer;transition:all .15s}
.tabs button:hover{color:#1e293b;border-color:#c7d2fe}
.tabs button.active{background:#eef2ff;color:#4f46e5;border-color:#4f46e5}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f8fafc}
/* Chat */
.chat-area{flex:1;overflow-y:auto;padding:16px 20px}
.msg{display:flex;gap:10px;margin-bottom:14px}
.msg.user{flex-direction:row-reverse}
.msg-av{width:30px;height:30px;border-radius:50%;background:#f1f5f9;border:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.msg-bd{max-width:80%;padding:10px 14px;border-radius:10px;background:#fff;border:1px solid #e2e8f0;font-size:13px;line-height:1.7;color:#1e293b}
.msg.user .msg-bd{background:#eef2ff;border-color:#c7d2fe}
.msg-bd pre{background:#f1f5f9;padding:10px;border-radius:5px;overflow-x:auto;margin:6px 0;border:1px solid #e2e8f0}
.msg-bd code{font-family:Consolas,Monaco,monospace;font-size:12px}
.msg-bd strong{color:#d97706}
.msg-bd h1,.msg-bd h2,.msg-bd h3{color:#4f46e5;margin:10px 0 6px;font-size:14px}
.msg-bd ul{padding-left:18px;margin:4px 0}
.msg-bd li{margin:3px 0}
.msg-bd p{margin:4px 0}
/* Input */
.input-area{padding:10px 20px;background:#fff;border-top:1px solid #e2e8f0;display:flex;gap:10px;flex-shrink:0}
.input-area textarea{flex:1;padding:8px 12px;background:#fff;border:1px solid #e2e8f0;border-radius:6px;color:#1e293b;font-size:13px;font-family:inherit;resize:none}
.input-area textarea:focus{outline:none;border-color:#4f46e5}
.input-area button{padding:8px 20px;background:linear-gradient(135deg,#4f46e5,#6366f1);border:none;border-radius:6px;color:#fff;font-weight:600;cursor:pointer;font-size:13px}
.input-area button:disabled{opacity:.5;cursor:not-allowed}
/* Brainstorm 整体浅色背景 */
.brain-area{flex:1;overflow-y:auto;padding:20px 24px 0;display:flex;justify-content:center;background:#f8fafc}
.brain-card{max-width:860px;width:100%;align-self:flex-start}
.brain-content strong{color:#d97706;font-weight:800}
.brain-content ul{list-style:none;padding-left:0}
.brain-content li{position:relative;padding:16px 20px 16px 60px;margin:16px 0;background:#f0f5ff;border-radius:12px;border-left:4px solid #6366f1;font-size:6rem!important;line-height:10!important;color:#1e293b}
.brain-content li::before{content:'⚡';position:absolute;left:18px;top:20px;font-size:3rem}
.brain-content p{font-size:6rem!important;line-height:10!important;color:#1e293b}
.brain-content h3{display:none}
.brain-content em{color:#ea580c;font-style:normal}
/* Buttons */
.tool-btns{display:flex;flex-wrap:wrap;gap:6px;padding:8px 20px;background:#fff;border-bottom:1px solid #e2e8f0}
.tool-btns button{padding:6px 14px;background:#fff;border:1px solid #e2e8f0;border-radius:6px;color:#1e293b;font-size:12px;cursor:pointer}
.tool-btns button:hover{border-color:#4f46e5}
.tool-btns button:disabled{opacity:.5;cursor:not-allowed}
/* Status bar */
.status{padding:6px 20px;background:#fff;border-top:1px solid #e2e8f0;font-size:11px;color:#94a3b8;flex-shrink:0}
.hidden{display:none}
</style>
</head>
<body>
<div class="header">
  <h1>🎓 C++ AI 教学助手</h1>
  <input id="topicInput" placeholder="课程主题（自动从URL读取）"/>
  <span id="statusText" style="font-size:11px;color:#555"></span>
</div>
<div class="tabs">
  <button class="active" onclick="switchTab('chat')">💬 对话</button>
  <button onclick="switchTab('brain')">💡 脑洞</button>
  <button onclick="switchTab('edge')">🧨 盲盒</button>
  <button onclick="switchTab('example')">📝 例题</button>
  <button onclick="switchTab('exercise')">✏️ 练习</button>
  <button onclick="switchTab('script')">📋 讲稿</button>
  <button onclick="switchTab('debug')">🔍 调试</button>
</div>
<div class="main">
  <!-- Chat -->
  <div id="tab-chat" class="chat-area"></div>
  <div id="input-chat" class="input-area">
    <textarea id="chatInput" rows="2" placeholder="输入问题... (Enter发送)"></textarea>
    <button id="chatBtn" onclick="sendChat()">发送</button>
  </div>
  <!-- Brain -->
  <div id="tab-brain" class="brain-area hidden"></div>
  <div id="input-brain" class="input-area hidden">
    <button onclick="genBrain()" id="brainBtn">💡 生成脑洞</button>
  </div>
  <!-- Edge -->
  <div id="tab-edge" class="chat-area hidden"></div>
  <div id="input-edge" class="input-area hidden">
    <textarea id="edgeInput" rows="3" placeholder="粘贴题目描述..."></textarea>
    <button onclick="genEdge()" id="edgeBtn">🧨 生成</button>
  </div>
  <!-- Example -->
  <div id="tab-example" class="chat-area hidden"></div>
  <div id="input-example" class="tool-btns hidden">
    <button onclick="genTeach('generate-example')" id="exBtn">📝 生成例题</button>
  </div>
  <!-- Exercise -->
  <div id="tab-exercise" class="chat-area hidden"></div>
  <div id="input-exercise" class="tool-btns hidden">
    <button onclick="genTeach('generate-exercise')" id="exerBtn">✏️ 生成练习题</button>
  </div>
  <!-- Script -->
  <div id="tab-script" class="chat-area hidden"></div>
  <div id="input-script" class="tool-btns hidden">
    <button onclick="genTeach('generate-script')" id="scriptBtn">📋 生成讲稿</button>
  </div>
  <!-- Debug -->
  <div id="tab-debug" class="chat-area hidden"></div>
  <div id="input-debug" class="input-area hidden">
    <textarea id="debugInput" rows="5" placeholder="粘贴C++代码..."></textarea>
    <button onclick="genDebug()" id="debugBtn">🔍 分析</button>
  </div>
</div>
<div class="status">💡 从 PPT 链接打开此页面，课程主题会自动填充。API: <span id="apiBase"></span></div>

<script>
const API = location.origin;
document.getElementById('apiBase').textContent = API;

// Read URL params
const params = new URLSearchParams(location.search);
const urlTopic = params.get('topic') || params.get('course') || '';
if (urlTopic) {
  document.getElementById('topicInput').value = decodeURIComponent(urlTopic);
}

let currentTab = 'chat';
const chatHistory = [];

function switchTab(tab) {
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  ['chat','brain','edge','example','exercise','script','debug'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('hidden', t!==tab);
    const inputEl = document.getElementById('input-'+t);
    if (inputEl) inputEl.classList.toggle('hidden', t!==tab);
  });
  currentTab = tab;
}

function getTopic() {
  return document.getElementById('topicInput').value.trim() || 'C++编程';
}

function setStatus(msg) {
  document.getElementById('statusText').textContent = msg;
}

// Markdown renderer (simple, no dependency)
function renderMd(text) {
  if (!text) return '';
  let html = text
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/\n/g, '<br>');
  // 先解析 markdown，再处理加粗（防止被转义）
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  return html;
}

function appendMsg(container, role, html) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const av = role === 'user' ? '👤' : '🤖';
  div.innerHTML = '<div class="msg-av">'+av+'</div><div class="msg-bd">'+html+'</div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div.querySelector('.msg-bd');
}

// SSE streaming helper
async function streamPost(url, body, onChunk) {
  try {
    const resp = await fetch(API + url, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream:true});
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const d = line.slice(6).trim();
          if (d === '[DONE]') return;
          try {
            const p = JSON.parse(d);
            if (p.content) onChunk(p.content);
            if (p.error) onChunk('\n⚠️ '+p.error);
          } catch(e){}
        }
      }
    }
  } catch(e) {
    onChunk('\n⚠️ 网络错误: '+e.message);
  }
}

// Chat
async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  const container = document.getElementById('tab-chat');
  appendMsg(container, 'user', renderMd(msg));
  chatHistory.push({role:'user', content:msg});
  const div = appendMsg(container, 'assistant', '⏳ 思考中...');
  let content = '';
  setStatus('AI 思考中...');
  await streamPost('/api/chat', {
    message: msg,
    history: chatHistory.slice(0,-1),
    courseTopic: getTopic()
  }, chunk => {
    content += chunk;
    div.innerHTML = renderMd(content);
    container.scrollTop = container.scrollHeight;
  });
  chatHistory.push({role:'assistant', content});
  setStatus('');
}

document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});

// Brainstorm
async function genBrain() {
  const btn = document.getElementById('brainBtn');
  btn.disabled = true; btn.textContent = '生成中...';
  const container = document.getElementById('tab-brain');
  container.innerHTML = '';
  let raw = '';
  setStatus('正在生成脑洞...');
  await streamPost('/api/opener', {courseTopic: getTopic()}, chunk => { raw += chunk; });
  try {
    let cleaned = raw.trim();
    if (cleaned.startsWith('```')) cleaned = cleaned.replace(/^```(?:json)?\s*\n?/,'').replace(/\n?```\s*$/,'');
    const data = JSON.parse(cleaned);
    container.innerHTML = `
      <div class="brain-card group relative overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-xl shadow-slate-200/60 border-l-4 border-l-indigo-500">
        <div class="px-8 py-5 border-b border-slate-100 bg-gradient-to-r from-indigo-50 to-cyan-50">
          <h3 class="text-5xl font-bold tracking-wide flex items-center gap-4" style="margin:0">
            <span class="text-6xl">🎬</span>
            <span class="text-indigo-600">3分钟脑洞</span>
          </h3>
        </div>
        <div class="px-8 py-6 brain-content">${renderMd(data.brainstorm)}</div>
      </div>`;
  } catch(e) {
    container.innerHTML = '<div class="msg"><div class="msg-av">🤖</div><div class="msg-bd">'+renderMd(raw)+'</div></div>';
  }
  btn.disabled = false; btn.textContent = '💡 生成脑洞';
  setStatus('');
}

// Edge case
async function genEdge() {
  const problem = document.getElementById('edgeInput').value.trim();
  if (!problem) return;
  const btn = document.getElementById('edgeBtn');
  btn.disabled = true;
  const container = document.getElementById('tab-edge');
  appendMsg(container, 'user', '题目：'+problem.slice(0,200));
  const div = appendMsg(container, 'assistant', '⏳ 分析边界...');
  let content = '';
  setStatus('生成边界测试点...');
  await streamPost('/api/edge-case', {problem}, chunk => {
    content += chunk;
    div.innerHTML = renderMd(content);
    container.scrollTop = container.scrollHeight;
  });
  btn.disabled = false;
  setStatus('');
}

// Teaching tools
async function genTeach(endpoint) {
  const topic = getTopic();
  const containerId = endpoint.includes('example') ? 'example' : endpoint.includes('exercise') ? 'exercise' : 'script';
  const container = document.getElementById('tab-'+containerId);
  const btnId = endpoint.includes('example') ? 'exBtn' : endpoint.includes('exercise') ? 'exerBtn' : 'scriptBtn';
  const btn = document.getElementById(btnId);
  btn.disabled = true;
  const div = appendMsg(container, 'assistant', '⏳ 生成中...');
  let content = '';
  setStatus('生成中...');
  const body = {courseTopic: topic};
  if (endpoint.includes('exercise')) { body.count=3; body.style='mixed'; }
  if (endpoint.includes('script')) { body.duration=45; }
  await streamPost('/api/'+endpoint, body, chunk => {
    content += chunk;
    div.innerHTML = renderMd(content);
    container.scrollTop = container.scrollHeight;
  });
  btn.disabled = false;
  setStatus('');
}

// Debug
async function genDebug() {
  const code = document.getElementById('debugInput').value.trim();
  if (!code) return;
  const btn = document.getElementById('debugBtn');
  btn.disabled = true;
  const container = document.getElementById('tab-debug');
  appendMsg(container, 'user', '<pre><code>'+code.replace(/</g,'&lt;')+'</code></pre>');
  const div = appendMsg(container, 'assistant', '⏳ 分析代码...');
  let content = '';
  setStatus('代码分析中...');
  await streamPost('/api/debug-code', {code}, chunk => {
    content += chunk;
    div.innerHTML = renderMd(content);
    container.scrollTop = container.scrollHeight;
  });
  btn.disabled = false;
  setStatus('');
}
</script>
</body>
</html>
