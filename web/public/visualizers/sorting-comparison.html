<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排序算法可视化工具</title>
    <!-- 引入 React 和 Babel 编译器 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <!-- 引入 Tailwind CSS 用于样式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #111827; }
        /* 自定义滚动条样式 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [array, setArray] = useState([]);
            const [arraySize, setArraySize] = useState(50);
            const [speed, setSpeed] = useState(20);
            const [sortingAlgorithm, setSortingAlgorithm] = useState('');
            const [isSorting, setIsSorting] = useState(false);
            const [comparisons, setComparisons] = useState(0);
            const [swaps, setSwaps] = useState(0);
            const [highlighted, setHighlighted] = useState([]);
            const [sortedIndices, setSortedIndices] = useState([]);
            
            const stopFlagRef = useRef(false);
            const speedRef = useRef(speed);

            useEffect(() => {
                speedRef.current = speed;
            }, [speed]);

            const algorithmComplexities = {
                bubble: { name: '冒泡排序', worst: 'O(n²)', avg: 'O(n²)', best: 'O(n)' },
                selection: { name: '选择排序', worst: 'O(n²)', avg: 'O(n²)', best: 'O(n²)' },
                insertion: { name: '插入排序', worst: 'O(n²)', avg: 'O(n²)', best: 'O(n)' },
                merge: { name: '归并排序', worst: 'O(n log n)', avg: 'O(n log n)', best: 'O(n log n)' },
                quick: { name: '快速排序', worst: 'O(n²)', avg: 'O(n log n)', best: 'O(n log n)' },
                heap: { name: '堆排序', worst: 'O(n log n)', avg: 'O(n log n)', best: 'O(n log n)' },
                bucket: { name: '桶排序', worst: 'O(n²)', avg: 'O(n+k)', best: 'O(n+k)' },
            };

            const generateNewArray = () => {
                stopFlagRef.current = true;
                setIsSorting(false);
                setSortingAlgorithm('');
                setComparisons(0);
                setSwaps(0);
                setHighlighted([]);
                setSortedIndices([]);
                const newArray = Array.from({ length: arraySize }, () => Math.floor(Math.random() * 350) + 10);
                setArray(newArray);
            };

            useEffect(() => {
                generateNewArray();
            }, [arraySize]);

            const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

            // --- 排序算法实现 ---

            const bubbleSort = async () => {
                if (isSorting) return;
                setIsSorting(true);
                setSortingAlgorithm('bubble');
                stopFlagRef.current = false;
                let arr = [...array];
                let n = arr.length;
                for (let i = 0; i < n - 1; i++) {
                    for (let j = 0; j < n - i - 1; j++) {
                        if (stopFlagRef.current) { setIsSorting(false); return; }
                        setHighlighted([j, j + 1]);
                        setComparisons(prev => prev + 1);
                        await delay(speedRef.current);
                        if (arr[j] > arr[j + 1]) {
                            [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
                            setSwaps(prev => prev + 1);
                            setArray([...arr]);
                        }
                    }
                    setSortedIndices(prev => [...prev, n - 1 - i]);
                }
                setSortedIndices(Array.from({ length: n }, (_, i) => i));
                setIsSorting(false);
                setHighlighted([]);
            };

            const selectionSort = async () => {
                if (isSorting) return;
                setIsSorting(true);
                setSortingAlgorithm('selection');
                stopFlagRef.current = false;
                let arr = [...array];
                let n = arr.length;
                for (let i = 0; i < n - 1; i++) {
                    let minIdx = i;
                    for (let j = i + 1; j < n; j++) {
                        if (stopFlagRef.current) return;
                        setHighlighted([i, j, minIdx]);
                        setComparisons(prev => prev + 1);
                        await delay(speedRef.current);
                        if (arr[j] < arr[minIdx]) minIdx = j;
                    }
                    if (minIdx !== i) {
                        [arr[i], arr[minIdx]] = [arr[minIdx], arr[i]];
                        setSwaps(prev => prev + 1);
                        setArray([...arr]);
                    }
                    setSortedIndices(prev => [...prev, i]);
                }
                setSortedIndices(Array.from({ length: n }, (_, i) => i));
                setIsSorting(false);
                setHighlighted([]);
            };

            const insertionSort = async () => {
                if (isSorting) return;
                setIsSorting(true);
                setSortingAlgorithm('insertion');
                stopFlagRef.current = false;
                let arr = [...array];
                let n = arr.length;
                for (let i = 1; i < n; i++) {
                    let key = arr[i];
                    let j = i - 1;
                    while (j >= 0 && arr[j] > key) {
                        if (stopFlagRef.current) return;
                        setHighlighted([i, j]);
                        setComparisons(prev => prev + 1);
                        arr[j + 1] = arr[j];
                        setArray([...arr]);
                        setSwaps(prev => prev + 1);
                        j--;
                        await delay(speedRef.current);
                    }
                    arr[j + 1] = key;
                    setArray([...arr]);
                    setSortedIndices(Array.from({ length: i + 1 }, (_, k) => k));
                }
                setSortedIndices(Array.from({ length: n }, (_, i) => i));
                setIsSorting(false);
                setHighlighted([]);
            };

            const heapSort = async () => {
                if (isSorting) return;
                setIsSorting(true);
                setSortingAlgorithm('heap');
                stopFlagRef.current = false;
                let arr = [...array];
                let n = arr.length;

                const heapify = async (n, i) => {
                    if (stopFlagRef.current) return;
                    let largest = i;
                    let l = 2 * i + 1;
                    let r = 2 * i + 2;
                    setHighlighted([i, l, r]);
                    setComparisons(prev => prev + 1);
                    await delay(speedRef.current);
                    if (l < n && arr[l] > arr[largest]) largest = l;
                    if (r < n && arr[r] > arr[largest]) largest = r;
                    if (largest !== i) {
                        [arr[i], arr[largest]] = [arr[largest], arr[i]];
                        setSwaps(prev => prev + 1);
                        setArray([...arr]);
                        await heapify(n, largest);
                    }
                };

                for (let i = Math.floor(n / 2) - 1; i >= 0; i--) await heapify(n, i);
                for (let i = n - 1; i > 0; i--) {
                    if (stopFlagRef.current) return;
                    [arr[0], arr[i]] = [arr[i], arr[0]];
                    setSwaps(prev => prev + 1);
                    setArray([...arr]);
                    setSortedIndices(prev => [...prev, i]);
                    await heapify(i, 0);
                }
                setSortedIndices(Array.from({ length: n }, (_, i) => i));
                setIsSorting(false);
                setHighlighted([]);
            };

            const mergeSort = async () => {
                if (isSorting) return;
                setIsSorting(true);
                setSortingAlgorithm('merge');
                stopFlagRef.current = false;
                let arr = [...array];
                
                const merge = async (l, m, r) => {
                    let n1 = m - l + 1;
                    let n2 = r - m;
                    let L = arr.slice(l, m + 1);
                    let R = arr.slice(m + 1, r + 1);
                    let i = 0, j = 0, k = l;
                    while (i < n1 && j < n2) {
                        if (stopFlagRef.current) return;
                        setHighlighted([l + i, m + 1 + j]);
                        setComparisons(prev => prev + 1);
                        await delay(speedRef.current);
                        if (L[i] <= R[j]) { arr[k] = L[i]; i++; }
                        else { arr[k] = R[j]; j++; }
                        setArray([...arr]);
                        k++;
                    }
                    while (i < n1) { arr[k] = L[i]; i++; k++; setArray([...arr]); await delay(speedRef.current); }
                    while (j < n2) { arr[k] = R[j]; j++; k++; setArray([...arr]); await delay(speedRef.current); }
                };

                const sort = async (l, r) => {
                    if (l >= r || stopFlagRef.current) return;
                    let m = Math.floor((l + r) / 2);
                    await sort(l, m);
                    await sort(m + 1, r);
                    await merge(l, m, r);
                };

                await sort(0, arr.length - 1);
                setSortedIndices(Array.from({ length: arr.length }, (_, i) => i));
                setIsSorting(false);
                setHighlighted([]);
            };

            const quickSort = async () => {
                if (isSorting) return;
                setIsSorting(true);
                setSortingAlgorithm('quick');
                stopFlagRef.current = false;
                let arr = [...array];

                const partition = async (low, high) => {
                    let pivot = arr[high];
                    let i = low - 1;
                    for (let j = low; j < high; j++) {
                        if (stopFlagRef.current) return -1;
                        setHighlighted([j, high]);
                        setComparisons(prev => prev + 1);
                        await delay(speedRef.current);
                        if (arr[j] < pivot) {
                            i++;
                            [arr[i], arr[j]] = [arr[j], arr[i]];
                            setSwaps(prev => prev + 1);
                            setArray([...arr]);
                        }
                    }
                    [arr[i + 1], arr[high]] = [arr[high], arr[i + 1]];
                    setSwaps(prev => prev + 1);
                    setArray([...arr]);
                    return i + 1;
                };

                const sort = async (low, high) => {
                    if (low < high) {
                        let pi = await partition(low, high);
                        if (pi === -1) return;
                        setSortedIndices(prev => [...prev, pi]);
                        await sort(low, pi - 1);
                        await sort(pi + 1, high);
                    } else if (low === high) {
                        setSortedIndices(prev => [...prev, low]);
                    }
                };

                await sort(0, arr.length - 1);
                setSortedIndices(Array.from({ length: arr.length }, (_, i) => i));
                setIsSorting(false);
                setHighlighted([]);
            };

            const bucketSort = async () => {
                if (isSorting) return;
                setIsSorting(true);
                setSortingAlgorithm('bucket');
                stopFlagRef.current = false;
                let arr = [...array];
                let max = Math.max(...arr);
                let bucketCount = 5;
                let buckets = Array.from({ length: bucketCount }, () => []);

                for (let i = 0; i < arr.length; i++) {
                    if (stopFlagRef.current) return;
                    let idx = Math.floor((arr[i] / (max + 1)) * bucketCount);
                    buckets[idx].push(arr[i]);
                    setHighlighted([i]);
                    await delay(speedRef.current);
                }

                let currentIdx = 0;
                for (let b = 0; b < bucketCount; b++) {
                    buckets[b].sort((a, b) => a - b);
                    for (let val of buckets[b]) {
                        if (stopFlagRef.current) return;
                        arr[currentIdx] = val;
                        setArray([...arr]);
                        setHighlighted([currentIdx]);
                        setSortedIndices(prev => [...prev, currentIdx]);
                        currentIdx++;
                        await delay(speedRef.current);
                    }
                }
                setIsSorting(false);
                setHighlighted([]);
            };

            return (
                <div className="flex h-screen flex-col items-center overflow-hidden p-3 text-white">
                    <div className="mb-3 text-center">
                        <h1 className="text-2xl font-bold">排序算法可视化工具</h1>
                    </div>

                    <div className="flex min-h-0 w-full max-w-7xl flex-1 flex-col md:flex-row md:space-x-5">
                        <div className="mb-3 flex min-h-0 flex-1 flex-col justify-end rounded-lg bg-gray-800 p-3 shadow-lg md:mb-0">
                            <div className="flex h-full min-h-0 w-full items-end justify-center">
                                {array.map((value, index) => (
                                    <div
                                        key={index}
                                        className="flex-grow mx-[0.5px] rounded-t-sm transition-all duration-75"
                                        style={{
                                            height: `${value}px`,
                                            backgroundColor: sortedIndices.includes(index) ? '#4ade80' : 
                                                            (highlighted.includes(index) ? '#facc15' : '#3b82f6')
                                        }}
                                    ></div>
                                ))}
                            </div>
                        </div>
                        
                        <div className="w-full overflow-y-auto rounded-lg bg-gray-800 p-4 shadow-lg md:w-72">
                            <div className="mb-4">
                                <h2 className="text-2xl font-semibold mb-4 border-b border-gray-700 pb-2">控制面板</h2>
                                <div className="flex flex-col space-y-3">
                                    <button onClick={generateNewArray} disabled={isSorting} className="bg-purple-600 hover:bg-purple-700 py-2 rounded-lg disabled:opacity-50">生成新数组</button>
                                    <button onClick={() => generateNewArray()} className="bg-red-600 hover:bg-red-700 py-2 rounded-lg">重置 / 停止</button>
                                    <div className="mt-2">
                                        <label className="text-xs text-gray-400">数量: {arraySize}</label>
                                        <input type="range" min="10" max="150" value={arraySize} onChange={(e)=>setArraySize(Number(e.target.value))} className="w-full" disabled={isSorting}/>
                                    </div>
                                    <div>
                                        <label className="text-xs text-gray-400">延迟: {speed}ms</label>
                                        <input type="range" min="1" max="200" value={speed} onChange={(e)=>setSpeed(Number(e.target.value))} className="w-full"/>
                                    </div>
                                </div>
                            </div>

                            <div className="mb-4">
                                <h2 className="text-xl font-semibold mb-3">算法选择</h2>
                                <div className="grid grid-cols-2 gap-2">
                                    <button onClick={bubbleSort} disabled={isSorting} className="bg-blue-600 hover:bg-blue-700 text-xs py-2 rounded disabled:opacity-50">冒泡排序</button>
                                    <button onClick={selectionSort} disabled={isSorting} className="bg-blue-600 hover:bg-blue-700 text-xs py-2 rounded disabled:opacity-50">选择排序</button>
                                    <button onClick={insertionSort} disabled={isSorting} className="bg-blue-600 hover:bg-blue-700 text-xs py-2 rounded disabled:opacity-50">插入排序</button>
                                    <button onClick={heapSort} disabled={isSorting} className="bg-blue-600 hover:bg-blue-700 text-xs py-2 rounded disabled:opacity-50">堆排序</button>
                                    <button onClick={mergeSort} disabled={isSorting} className="bg-blue-600 hover:bg-blue-700 text-xs py-2 rounded disabled:opacity-50">归并排序</button>
                                    <button onClick={quickSort} disabled={isSorting} className="bg-blue-600 hover:bg-blue-700 text-xs py-2 rounded disabled:opacity-50">快速排序</button>
                                    <button onClick={bucketSort} disabled={isSorting} className="bg-blue-600 hover:bg-blue-700 text-xs py-2 rounded disabled:opacity-50">桶排序</button>
                                </div>
                            </div>

                            <div className="bg-gray-900 p-4 rounded-lg text-sm">
                                <p className="text-gray-400 italic mb-2">
                                    {sortingAlgorithm ? `正在运行: ${algorithmComplexities[sortingAlgorithm].name}` : '请选择算法开始'}
                                </p>
                                <p>比较次数: <span className="text-yellow-400">{comparisons}</span></p>
                                <p>交换次数: <span className="text-yellow-400">{swaps}</span></p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
