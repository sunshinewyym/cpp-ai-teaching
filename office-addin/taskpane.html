<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C++ AI 教学助手</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #0f0f23;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 12px 16px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
    }
    .header h1 { font-size: 16px; color: #00d4ff; }

    .context-bar {
      padding: 8px 16px;
      background: #12122a;
      border-bottom: 1px solid #2a2a4a;
      font-size: 12px;
      color: #888;
    }
    .context-bar .label { color: #00d4ff; }

    .tools {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 16px;
      background: #12122a;
      border-bottom: 1px solid #2a2a4a;
    }
    .tools button {
      padding: 6px 12px;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 12px;
      cursor: pointer;
    }
    .tools button:hover { border-color: #00d4ff; }
    .tools button:disabled { opacity: 0.5; cursor: not-allowed; }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    .msg {
      margin-bottom: 12px;
      display: flex;
      gap: 8px;
    }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: #1e1e3a; display: flex; align-items: center;
      justify-content: center; font-size: 14px; flex-shrink: 0;
    }
    .msg-content {
      max-width: 80%; padding: 8px 12px; border-radius: 10px;
      background: #1a1a2e; font-size: 13px; line-height: 1.6;
    }
    .msg.user .msg-content { background: #1a2a4a; }
    .msg-content pre {
      background: #0d0d1a; padding: 8px; border-radius: 4px;
      overflow-x: auto; margin: 6px 0; font-size: 12px;
    }
    .msg-content code {
      font-family: Consolas, Monaco, monospace; font-size: 12px;
    }
    .msg-content strong { color: #ffd700; }

    .input-area {
      padding: 10px 16px;
      background: #12122a;
      border-top: 1px solid #2a2a4a;
    }
    .input-area textarea {
      width: 100%; padding: 8px 12px; background: #1a1a2e;
      border: 1px solid #2a2a4a; border-radius: 6px;
      color: #e0e0e0; font-size: 13px; resize: none;
      font-family: inherit;
    }
    .input-area textarea:focus { outline: none; border-color: #00d4ff; }
    .send-btn {
      margin-top: 6px; width: 100%; padding: 8px;
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      border: none; border-radius: 6px; color: #fff;
      font-weight: 600; cursor: pointer; font-size: 13px;
    }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .iframe-container {
      flex: 1;
      display: none;
    }
    .iframe-container.active {
      display: block;
    }
    .iframe-container iframe {
      width: 100%; height: 100%; border: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎓 C++ AI 教学助手</h1>
  </div>

  <div class="context-bar" id="contextBar">
    <span class="label">PPT上下文：</span>
    <span id="pptContext">正在读取...</span>
  </div>

  <div class="tools">
    <button onclick="askAI('explain')">📖 解释当前内容</button>
    <button onclick="askAI('opener')">💡 算法脑洞</button>
    <button onclick="askAI('example')">📝 生成例题</button>
    <button onclick="askAI('exercise')">✏️ 练习题</button>
    <button onclick="askAI('edge')">🧨 边界盲盒</button>
    <button onclick="askAI('script')">📋 生成讲稿</button>
    <button onclick="toggleIframe()">🖥️ 完整界面</button>
  </div>

  <!-- Inline chat -->
  <div class="chat-area" id="chatArea"></div>
  <div class="input-area" id="inputArea">
    <textarea id="userInput" rows="2" placeholder="输入问题... (Enter发送)"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
  </div>

  <!-- Full UI iframe (hidden by default) -->
  <div class="iframe-container" id="iframeContainer">
    <iframe id="mainFrame" src="about:blank"></iframe>
  </div>

  <script>
    const API_BASE = 'https://localhost:3000';
    let pptContextStr = '';
    let isStreaming = false;

    // Initialize Office.js
    Office.onReady((info) => {
      if (info.host === Office.HostType.PowerPoint) {
        readPPTContext();
      }
    });

    // Read PPT context
    async function readPPTContext() {
      try {
        await PowerPoint.run(async (context) => {
          const slides = context.presentation.getSelectedSlides();
          slides.load('items');
          await context.sync();

          if (slides.items.length > 0) {
            const slide = slides.items[0];
            slide.load('title, notes');
            await context.sync();

            const title = slide.title || '（无标题）';
            const notes = slide.notes || '';
            const selectedText = await getSelectedText(context);

            pptContextStr = `课程标题：${title}`;
            if (notes) pptContextStr += `\n备注：${notes}`;
            if (selectedText) pptContextStr += `\n选中文本：${selectedText}`;

            document.getElementById('pptContext').textContent = title;
          }
        });
      } catch (e) {
        document.getElementById('pptContext').textContent = '（请在PowerPoint中使用）';
        pptContextStr = '';
      }
    }

    async function getSelectedText(context) {
      try {
        const selection = context.document.getSelection();
        selection.load('text');
        await context.sync();
        return selection.text || '';
      } catch (e) {
        return '';
      }
    }

    // Toggle between chat and iframe
    function toggleIframe() {
      const container = document.getElementById('iframeContainer');
      const chatArea = document.getElementById('chatArea');
      const inputArea = document.getElementById('inputArea');

      if (container.classList.contains('active')) {
        container.classList.remove('active');
        chatArea.style.display = '';
        inputArea.style.display = '';
      } else {
        container.classList.add('active');
        chatArea.style.display = 'none';
        inputArea.style.display = 'none';
        document.getElementById('mainFrame').src = API_BASE.replace(':3000', ':5173');
      }
    }

    // Quick AI actions
    async function askAI(type) {
      const topic = extractTopic();
      const prompts = {
        explain: `请解释当前PPT页面的内容，适合10-14岁学生理解。课程主题：${topic}`,
        opener: `courseTopic:${topic}`,
        example: `courseTopic:${topic}`,
        exercise: `courseTopic:${topic}`,
        edge: `请为当前课程"${topic}"生成3个极端边界测试点`,
        script: `courseTopic:${topic}`,
      };

      const prompt = prompts[type];

      if (type === 'opener') {
        await streamToChat('/api/opener', { courseTopic: topic });
      } else if (type === 'example') {
        await streamToChat('/api/generate-example', { courseTopic: topic });
      } else if (type === 'exercise') {
        await streamToChat('/api/generate-exercise', { courseTopic: topic });
      } else if (type === 'script') {
        await streamToChat('/api/generate-script', { courseTopic: topic });
      } else if (type === 'edge') {
        await streamToChat('/api/edge-case', { problem: topic + '相关题目' });
      } else {
        await streamToChat('/api/chat', {
          message: prompt,
          courseTopic: topic,
          pptContext: pptContextStr,
        });
      }
    }

    function extractTopic() {
      const ctx = document.getElementById('pptContext').textContent;
      return ctx && ctx !== '正在读取...' && ctx !== '（请在PowerPoint中使用）' ? ctx : 'C++编程';
    }

    // Send chat message
    async function sendMessage() {
      const input = document.getElementById('userInput');
      const msg = input.value.trim();
      if (!msg || isStreaming) return;

      input.value = '';
      appendMessage('user', msg);

      await streamToChat('/api/chat', {
        message: msg,
        courseTopic: extractTopic(),
        pptContext: pptContextStr,
      });
    }

    // Stream response to chat area
    async function streamToChat(endpoint, body) {
      isStreaming = true;
      document.getElementById('sendBtn').disabled = true;
      const div = appendMessage('assistant', '⏳ 思考中...');

      try {
        const resp = await fetch(API_BASE + endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let content = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6).trim();
              if (data === '[DONE]') break;
              try {
                const parsed = JSON.parse(data);
                if (parsed.content) {
                  content += parsed.content;
                  div.innerHTML = renderSimple(content);
                }
              } catch (e) {}
            }
          }
        }

        if (!content) div.innerHTML = '（无响应）';
      } catch (e) {
        div.innerHTML = `⚠️ 错误: ${e.message}`;
      }

      isStreaming = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
    }

    function appendMessage(role, content) {
      const area = document.getElementById('chatArea');
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      const avatar = role === 'user' ? '👤' : '🤖';
      div.innerHTML = `
        <div class="msg-avatar">${avatar}</div>
        <div class="msg-content">${renderSimple(content)}</div>
      `;
      area.appendChild(div);
      area.scrollTop = area.scrollHeight;
      return div.querySelector('.msg-content');
    }

    // Simple markdown renderer (no dependency)
    function renderSimple(text) {
      return text
        .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\n/g, '<br>');
    }
  </script>
</body>
</html>
